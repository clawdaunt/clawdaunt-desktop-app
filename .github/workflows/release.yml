name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            artifact: clawdaunt-macos
          - os: windows-latest
            platform: win32
            artifact: clawdaunt-windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    env:
      # macOS code signing (set these as repo secrets if you have them)
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Windows code signing (set these as repo secrets if you have them)
      WIN_CERTIFICATE_FILE: ${{ secrets.WIN_CERTIFICATE_FILE }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle external dependencies
        run: node scripts/bundle-deps.js

      - name: Build with Electron Forge
        run: npx electron-forge make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: clawdaunt-macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: clawdaunt-windows
          path: artifacts/windows

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Collect release files
        id: files
        run: |
          mkdir -p release-files
          # macOS DMG
          find artifacts/macos -name '*.dmg' -exec cp {} release-files/ \;
          # Windows installer (Squirrel .exe setup)
          find artifacts/windows -path '*/squirrel.windows/*' -name '*.exe' -exec cp {} release-files/ \;
          # Windows ZIP
          find artifacts/windows -path '*/zip/*' -name '*.zip' -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clawdaunt ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: true
